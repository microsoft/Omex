name: Package Updates (GitHub)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write

jobs:
  run-script-and-pr:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Update NuGet Packages
        shell: pwsh
        run: |
          ./.github/scripts/Update-NuGetPackageVersions.ps1 -Verbose -NugetConfigPath "NuGet-GitHub.Config"

      - name: Update .NET SDK
        shell: pwsh
        run: |
          ./.github/scripts/Update-DotNetSdkVersions.ps1 -Verbose -NugetConfigPath "NuGet-GitHub.Config"

      - name: Create branch, commit, push
        id: commit
        shell: pwsh
        run: |
          $branch = "automation/package-update-${{ github.run_id }}-${{ github.run_attempt }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b $branch
          git add -A

          if (git diff --cached --quiet) {
            Write-Host "No changes detected; skipping commit and PR creation."
            "has-changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }

          git commit -m "chore(automation): update NuGet packages and .NET SDK versions"
          git push --set-upstream origin $branch
          "has-changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Open PR with gh
        if: steps.commit.outputs.has-changes == 'true' && steps.commit.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.CREATE_PACKAGEUPDATE }}
        shell: pwsh
        run: |
          git fetch origin main
          $commits = git log --oneline origin/main..HEAD
          if (-not $commits) {
            Write-Host "No commits between origin/main and HEAD; skipping PR creation."
            exit 0
          }
          gh pr create `
            --title "Automated Package Update" `
            --body "This PR was created automatically by the workflow run ${{ github.run_id }} (attempt ${{ github.run_attempt }})." `
            --base main `
            --head "automation/package-update-${{ github.run_id }}-${{ github.run_attempt }}" `
            --label automation `
            --assignee "${{ github.actor }}"
